<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=20260522d">
    <title>つるマルシェ | つるまい自治協議会</title>
</head>
<body>
    <header class="header">
        <div class="header__container">
            <h1 class="header__logo"><a href="../index.html"><span class="header__logo-text">つるまい自治協議会</span></a></h1>
            <nav class="header__nav"><ul class="header__nav-list"><li class="header__nav-item"><a href="../index.html">ホーム</a></li></ul></nav>
        </div>
    </header>

    <main class="event-detail-page">
        <section class="event-detail-hero">
            <img src="../images/events/tsuru-marche-2026-05-1.jpg" alt="つるマルシェの様子">
            <div class="event-detail-hero__overlay"></div>
            <div class="event-detail-hero__content">
                <p class="event-detail-hero__label">毎月開催</p>
                <h1>つるマルシェ</h1>
                <p>買い物と交流を楽しむ、地域の小さなマルシェです。</p>
            </div>
        </section>
        <section class="event-detail-body">
            <div class="event-detail-card">
                <h2>開催日時</h2>
                <p class="event-detail-schedule"><i class="fa-solid fa-calendar-days"></i> 毎月第3土曜日　午前10時から</p>
                <p>地域の皆さんが集まり、新鮮な野菜などの買い物と交流を楽しむ場です。</p>
                <div class="event-detail-gallery event-detail-gallery--double">
                    <img src="../images/events/tsuru-marche-2026-05-1.jpg" alt="つるマルシェの様子1">
                    <img src="../images/events/tsuru-marche-2026-05-2.jpg" alt="つるマルシェの様子2">
                </div>
                <p class="event-detail-actions"><a href="../index.html#community-events" class="btn btn-secondary">トップへ戻る</a></p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2024 つるまい自治協議会 All Rights Reserved.</p></div></div>
    </footer>
